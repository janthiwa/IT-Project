<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Connection - ระบบโรงพยาบาล</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="connect-container">
    <header class="hospital-header">
        <div class="header-content">
            <div class="icon-box">
                <i class="fa-solid fa-hospital"></i>
            </div>
            <div class="hospital-info">
                <h1 class="hospital-name-th">โรงพยาบาลพรีเมียมพลาซ่า</h1>
                <p class="hospital-name-en">PREMIUM PLAZA HOSPITAL</p>
            </div>
        </div>
    </header>
    <div class="connect-card">
        <h1 id="status-title">กำลังตรวจสอบการเชื่อมต่อ...</h1>
        
        <div id="result-box" class="connect-result"></div>
        
        <br>
        
        <a href="registration.html" class="submit-btn" style="text-decoration: none;">กลับไปหน้าลงทะเบียน</a>
    </div>

    <script src="js/connect.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
