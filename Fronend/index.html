<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">

</head>
<body>
    <div class="container">
        <a href="user.html">Back to user management</a>
        <div class="header">
            Register form
        </div>
        <div class="flex form-input">
            <div class="header-form">ชื่อผู้ป่วย</div>
            <input class="form" name="firstname" type="text">
        </div>
        <div class="flex form-input">
            <div class="header-form">นามสกุลผู้ป่วย</div>
            <input class="form" name="lastname" type="text">
        </div>
        <div class="flex form-input">
            <div class="header-form">อายุผู้ป่วย</div> 
            <input class="form" name="age" type="number" min="0" max="100">
        </div>
        <div class="flex form-input">
        <div class="header-form">วันที่เข้าตรวจ</div>
            <input class="form" type="date" name="checkup_date">
        </div>
            <div class="flex gender form-input">
            <div class="header-form">เพศผู้ป่วย</div> 
            <div class="flex">
            <div>
                <input name="gender" type="radio" value="ชาย"> ชาย
            </div>
            <div>
                <input name="gender" type="radio" value="หญิง"> หญิง
            </div>
            <div>
                <input name="gender" type="radio" value="อื่นๆ"> อื่นๆ
            </div>
            </div>
        </div>
        <div class="form-input">
            ระบุโรคประจำตัวผู้ป่วย
            <div>
                <input name="congenital_disease" type="checkbox" value="ไม่มี" onchange="handleCheckboxChange(this)"> ไม่มี
            </div>
            <div>
                <input name="congenital_disease" type="checkbox" value="โรคความดันโลหิต" onchange="handleCheckboxChange(this)"> โรคความดันโลหิต
            </div>
            <div>
                <input name="congenital_disease" type="checkbox" value="โรคเบาหวาน" onchange="handleCheckboxChange(this)"> โรคเบาหวาน
            </div>
            <div>
                <input name="congenital_disease" type="checkbox" value="โรคไต" onchange="handleCheckboxChange(this)"> โรคไต
            </div>
            <div>
                <input name="congenital_disease" type="checkbox" value="โรคกรดไหลย้อน" onchange="handleCheckboxChange(this)"> โรคกรดไหลย้อน
            </div>
            <div>
                <input name="congenital_disease" type="checkbox" value="โรคหัวใจ" onchange="handleCheckboxChange(this)"> โรคหัวใจ
            </div>
            <div>
                <input name="congenital_disease" type="checkbox" value="อื่นๆ" onchange="handleCheckboxChange(this)" id="otherCheckbox"> อื่นๆ
                <input type="text" id="otherDiseaseDetail" name="other_disease_detail" placeholder="ระบุโรคประจำตัวอื่นๆ...">
            </div>
            </div>
        <div class="form-input">
            ผลการวินิจฉัย การรักษา หรือ ยาที่ได้รับ
            <textarea name="diagnosis" placeholder="ระบุอาการผู้ป่วย..."></textarea>
            </div>
        <div id="message" class="message"></div>
        <div class="center">
            <button onclick="submitData()" class="button">ส่งข้อมูล</button>
            </div>
        </div>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <script src="index.js"></script>
</body>
</html>
