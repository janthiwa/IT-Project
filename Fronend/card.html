<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Card</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .card { border-top: 5px solid #3498db; text-align: left; }
        .row { display: flex; justify-content: space-between; margin: 10px 0; border-bottom: 1px ghostwhite solid; }
        .label { font-weight: bold; color: #555; }
        .print-btn { background-color: #3498db; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px; width: 100%; }
    </style>
</head>
<body>
    <div class="container card">
        <h2 style="text-align: center; color: #3498db;">ใบนัดหมายติดตามอาการ</h2>
        <hr>
        <div id="cardContent">
            <p>กำลังโหลดข้อมูลใบนัดของผู้ป่วย...</p>
        </div>
        <button class="print-btn" onclick="window.print()">พิมพ์ใบนัดหมาย</button>
        <p style="text-align: center;"><a href="appointment.html" style="color: #999; font-size: 12px;">กลับหน้าพบนัดหมาย</a></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        window.onload = async () => {
    // 1. ดึงค่า ID จาก URL (เช็คให้ชัวร์ว่าใน URL เขียนว่า ?id=...)
        const urlParams = new URLSearchParams(window.location.search);
        const appId = urlParams.get('id'); // ตรวจสอบว่าใน URL ใช้ชื่อ id

    if (appId) {
    try {
        // 2. เปลี่ยน URL ให้ตรงกับ Backend (ใช้ /appointment-card/)
        const response = await axios.get(`http://localhost:8000/appointment-card/${appId}`);
        const data = response.data;

        // 3. หยอดข้อมูลลงในหน้าเว็บ (ใช้ชื่อตัวแปรที่ดึงมาจาก Backend)
        document.getElementById('cardContent').innerHTML = `
            <div class="info-row"><span>ชื่อ-นามสกุล:</span> <span>${data.firstname} ${data.lastname}</span></div>
            <div class="info-row"><span>อายุ:</span> <span>${data.age} ปี</span></div>
            <div class="info-row"><span>วันที่นัดหมาย:</span> <span>${new Date(data.app_date).toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' })}</span></div>
            <div class="info-row"><span>เวลานัดหมาย:</span> <span>${data.app_time.substring(0, 5)} น.</span></div>
            <div class="info-row"><span>สถานที่:</span> <span>${data.location}</span></div>
            <div class="info-row"><span>อาการ/โรคประจำตัว:</span> <span>${data.congenital_disease}</span></div>
        `;
    } catch (error) {
        console.error('เกิดข้อผิดพลาด:', error);
        document.getElementById('cardContent').innerHTML = '<p style="color:red;">ไม่พบข้อมูลใบนัดหมาย</p>';
    }
}
    };
    </script>
</body>
</html>
